<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#c44dff"/>
      <stop offset="100%" style="stop-color:#6e3aff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6bca;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect x="16" y="16" width="224" height="224" rx="36" fill="rgba(255,255,255,0.1)"/>
  <!-- Calculator body -->
  <rect x="56" y="40" width="144" height="176" rx="20" fill="rgba(10,0,25,0.6)" filter="url(#shadow)"/>
  <!-- Display -->
  <rect x="68" y="52" width="120" height="44" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="176" y="84" fill="white" font-family="monospace" font-size="24" font-weight="bold" text-anchor="end">42</text>
  <!-- Buttons row 1 -->
  <rect x="68" y="106" width="26" height="26" rx="8" fill="rgba(196,77,255,0.4)"/>
  <rect x="99" y="106" width="26" height="26" rx="8" fill="rgba(196,77,255,0.4)"/>
  <rect x="130" y="106" width="26" height="26" rx="8" fill="rgba(196,77,255,0.4)"/>
  <rect x="162" y="106" width="26" height="26" rx="8" fill="rgba(255,107,157,0.5)"/>
  <!-- Buttons row 2 -->
  <rect x="68" y="138" width="26" height="26" rx="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="99" y="138" width="26" height="26" rx="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="130" y="138" width="26" height="26" rx="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="162" y="138" width="26" height="26" rx="8" fill="rgba(255,107,157,0.5)"/>
  <!-- Buttons row 3 -->
  <rect x="68" y="170" width="58" height="26" rx="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="130" y="170" width="26" height="26" rx="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="162" y="170" width="26" height="26" rx="8" fill="url(#bg)"/>
  <!-- Stars -->
  <text x="38" y="38" fill="url(#glow)" font-size="22">✦</text>
  <text x="210" y="30" fill="url(#glow)" font-size="16">✧</text>
  <text x="220" y="230" fill="url(#glow)" font-size="18">✦</text>
  <text x="28" y="240" fill="url(#glow)" font-size="14">✧</text>
  <text x="128" y="240" fill="url(#glow)" font-size="12">♡</text>
</svg>
